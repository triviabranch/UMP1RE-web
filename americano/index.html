<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#24262e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ump1re">
<link rel="manifest" href="/americano/manifest.json">
<link rel="icon" href="/assets/Americano_logo.png">
<link rel="apple-touch-icon" href="/assets/Americano_logo.png">
<title>Ump1re · Americano</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="preload" href="/assets/TimesSquare-m105.ttf" as="font" type="font/ttf" crossorigin="anonymous">
<style>
  @font-face {
    font-family: 'TimesSquare';
    src: url('/assets/TimesSquare-m105.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --bg: #24262e;
    --bg2: #2c2e37;
    --panel: rgba(17, 18, 31, 0.84);
    --line: rgba(255,255,255,0.09);
    --line-strong: rgba(255,255,255,0.16);
    --text: #f4f6ff;
    --muted: rgba(244,246,255,0.68);
    --dim: rgba(244,246,255,0.45);
    --lime: #d9ff33;
    --blue: #7fb8ff;
    --danger: #ff6b6b;
    --shadow: 0 28px 100px rgba(0,0,0,0.45);
    --radius: 22px;
    --display: 'TimesSquare', 'Bebas Neue', sans-serif;
    --body: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: var(--body);
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(217,255,51,0.12), transparent 28%),
      radial-gradient(circle at top right, rgba(255,255,255,0.08), transparent 30%),
      linear-gradient(180deg, #2c2e37 0%, #24262e 50%, #1a1c22 100%);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: linear-gradient(180deg, rgba(0,0,0,0.45), transparent 85%);
    opacity: 0.35;
  }

  a { color: inherit; }
  button, input, select { font: inherit; }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100dvh;
    padding: 0.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .topbar {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.45rem;
    padding: 0.7rem 0.8rem 0.75rem;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: rgba(7, 7, 13, 0.74);
    backdrop-filter: blur(18px);
    box-shadow: var(--shadow);
  }

  .brand {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 0.35rem;
    text-decoration: none;
  }

  .brand img {
    width: 44px;
    height: auto;
    display: block;
    filter: drop-shadow(0 10px 24px rgba(0,0,0,0.3));
  }

  .topbar-copy {
    min-width: 0;
    text-align: center;
  }

  .eyebrow {
    font-size: 0.68rem;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--lime);
  }

  .topbar-copy h1 {
    margin: 0;
    font-family: var(--display);
    font-size: clamp(1.3rem, 5vw, 1.7rem);
    line-height: 0.92;
    letter-spacing: 0.05em;
    color: var(--lime);
  }

  .topbar-copy p {
    margin: 0.3rem 0 0;
    color: var(--muted);
    font-size: 0.74rem;
    line-height: 1.45;
  }

  body[data-page-mode="landing"] .topbar {
    display: none;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    min-height: 42px;
    padding: 0.72rem 1rem;
    border-radius: 12px;
    border: 1px solid transparent;
    cursor: pointer;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 0.76rem;
    font-weight: 800;
    transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease, opacity 0.16s ease;
  }

  .btn:hover { transform: translateY(-1px); }
  .btn.primary { background: var(--lime); color: #24262e; }
  .btn.primary:hover { background: #e4ff5a; }
  .btn.secondary {
    background: rgba(255,255,255,0.03);
    color: var(--muted);
    border-color: var(--line);
  }
  .btn.secondary:hover {
    color: var(--text);
    border-color: var(--line-strong);
  }
  .btn.ghost {
    background: transparent;
    color: var(--dim);
    border-color: var(--line);
  }
  .btn.ghost:hover {
    color: var(--text);
    border-color: var(--line-strong);
  }

  .page-shell {
    position: relative;
    flex: 1;
    min-height: 0;
    border: 1px solid var(--line);
    border-radius: 22px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)),
      rgba(17, 18, 31, 0.75);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: none;
    padding: 0.65rem;
    min-height: 0;
  }

  .screen.active {
    display: flex;
    flex-direction: column;
  }

  body[data-page-mode="setup"] .screen.active {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .screen-head {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-start;
    gap: 0.5rem;
    margin-bottom: 0.65rem;
  }

  .screen-head h2 {
    margin: 0;
    font-family: var(--display);
    font-size: clamp(1.8rem, 8vw, 2.8rem);
    line-height: 0.92;
    letter-spacing: 0.06em;
  }

  .screen-head p {
    margin: 0.25rem 0 0;
    color: var(--muted);
    font-size: 0.84rem;
    line-height: 1.45;
  }

  .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;
    justify-content: flex-start;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.42rem 0.65rem;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.03);
    color: var(--muted);
    font-size: 0.68rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .content {
    flex: 1;
    min-height: 0;
    display: grid;
    gap: 0.65rem;
  }

  .card {
    border: 1px solid var(--line);
    border-radius: 18px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)),
      rgba(255,255,255,0.02);
    overflow: hidden;
  }

  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.75rem 0.85rem;
    border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,0.02);
  }

  .card-head .title {
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--lime);
  }

  .card-head .meta {
    color: var(--dim);
    font-size: 0.82rem;
  }

  .card-body {
    padding: 0.8rem 0.85rem 0.85rem;
    min-height: 0;
  }

  .landing {
    display: grid;
    place-items: center;
    gap: 0.9rem;
    height: 100%;
  }

  .landing-card {
    width: min(760px, 100%);
    padding: 0.7rem 0.8rem 0.85rem;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: rgba(7, 7, 13, 0.74);
    backdrop-filter: blur(18px);
    box-shadow: var(--shadow);
    text-align: center;
  }

  .landing-logo {
    display: block;
    width: min(72vw, 220px);
    height: auto;
    margin: 0 auto;
    filter: drop-shadow(0 12px 28px rgba(0,0,0,0.3));
  }

  .landing-card h2 {
    margin: 0;
    font-family: var(--display);
    font-size: clamp(3rem, 6vw, 5.3rem);
    letter-spacing: 0.06em;
    line-height: 0.9;
    color: var(--lime);
  }

  .landing-card p {
    margin: 0.9rem auto 0;
    max-width: 56ch;
    color: var(--muted);
    font-size: 1rem;
    line-height: 1.6;
  }

  .landing-actions {
    margin-top: 0;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .landing-actions .btn.primary {
    min-height: 68px;
    padding: 1.1rem 1.75rem;
    font-size: 1.02rem;
    letter-spacing: 0.14em;
  }

  .setup-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.65rem;
    height: 100%;
    min-height: 0;
  }

  .setup-flow,
  .names-flow {
    display: grid;
    gap: 0.65rem;
    min-height: 0;
  }

  .setup-panel,
  .names-panel {
    display: grid;
    gap: 0.65rem;
    min-height: 0;
  }

  .choice-group {
    display: grid;
    gap: 0.5rem;
    padding-top: 0.25rem;
  }

  .choice-label {
    font-size: 0.62rem;
    font-weight: 800;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--dim);
    text-align: center;
  }

  .choice-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 0.55rem;
  }

  .choice-card {
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 0.95rem 0.65rem;
    background: rgba(255,255,255,0.02);
    display: grid;
    gap: 0.28rem;
    text-align: center;
    cursor: pointer;
    color: var(--text);
    min-height: 5.2rem;
  }

  .choice-card.active {
    border-color: rgba(217,255,51,0.4);
    background: rgba(217,255,51,0.08);
  }

  .choice-card.active .choice-value {
    color: var(--lime);
  }

  .choice-value {
    font-family: var(--display);
    font-size: 2.05rem;
    line-height: 0.9;
    letter-spacing: 0.05em;
  }

  .choice-sub {
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--dim);
  }

  body[data-page-mode="setup"] .screen-head,
  body[data-page-mode="names"] .screen-head {
    align-items: center;
    text-align: center;
    justify-content: center;
    gap: 0.25rem;
    margin-top: 0.35rem;
    margin-bottom: 0.55rem;
  }

  body[data-page-mode="setup"] .screen-head p,
  body[data-page-mode="names"] .screen-head p {
    max-width: 34ch;
  }

  body[data-page-mode="setup"] .screen.active,
  body[data-page-mode="names"] .screen.active {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  body[data-page-mode="setup"] .setup-panel,
  body[data-page-mode="names"] .names-panel {
    gap: 1.1rem;
    width: min(920px, 100%);
    justify-self: center;
    min-height: auto;
  }

  body[data-page-mode="setup"] .choice-group,
  body[data-page-mode="names"] .choice-group {
    gap: 0.7rem;
    padding-top: 0.35rem;
  }

  body[data-page-mode="setup"] .choice-label,
  body[data-page-mode="names"] .choice-label {
    margin-bottom: 0.05rem;
  }

  body[data-page-mode="setup"] .choice-grid,
  body[data-page-mode="names"] .choice-grid {
    gap: 0.9rem;
  }

  body[data-page-mode="setup"] .choice-card,
  body[data-page-mode="names"] .choice-card {
    padding: 0.9rem 0.75rem;
    min-height: 5.8rem;
    border-radius: 20px;
    background:
      radial-gradient(circle at top, rgba(217,255,51,0.08), transparent 45%),
      rgba(255,255,255,0.02);
  }

  body[data-page-mode="setup"] .choice-value,
  body[data-page-mode="names"] .choice-value {
    font-size: 2.45rem;
  }

  body[data-page-mode="setup"] .choice-sub,
  body[data-page-mode="names"] .choice-sub {
    font-size: 0.7rem;
  }

  body[data-page-mode="setup"] .setup-flow,
  body[data-page-mode="names"] .names-flow {
    align-content: stretch;
    justify-items: stretch;
  }

  input[type="text"] {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #101120;
    color: var(--text);
    padding: 0.68rem 0.8rem;
    outline: none;
  }

  input[type="text"]:focus {
    border-color: rgba(217,255,51,0.35);
  }

  .player-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.55rem;
    align-content: start;
  }

  body[data-page-mode="names"] .names-panel .card-body:first-of-type {
    padding-bottom: 0.3rem;
  }

  body[data-page-mode="names"] .names-panel .card-body:last-of-type {
    padding-top: 0.15rem;
  }

  body[data-page-mode="names"] .player-grid {
    grid-template-columns: 1fr;
    gap: 0.35rem;
  }

  body[data-page-mode="names"] .screen-head {
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 0.35rem;
    margin-bottom: 0.45rem;
  }

  body[data-page-mode="names"] .screen-head p {
    display: none;
  }

  body[data-page-mode="names"] .chip-row {
    gap: 0.3rem;
  }

  body[data-page-mode="names"] .chip {
    padding: 0.34rem 0.5rem;
    font-size: 0.6rem;
  }

  body[data-page-mode="names"] .names-panel {
    gap: 0.4rem;
    height: auto;
    min-height: 0;
    width: min(920px, 100%);
    justify-self: center;
  }

  body[data-page-mode="names"] .names-panel .card-head {
    padding: 0.55rem 0.65rem;
  }

  body[data-page-mode="names"] .names-panel .card-body {
    padding-left: 0.65rem;
    padding-right: 0.65rem;
  }

  body[data-page-mode="names"] .names-reset-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 0.55rem;
  }

  body[data-page-mode="names"] .names-panel .card-head .meta {
    font-size: 0.68rem;
  }

  body[data-page-mode="names"] .player-row {
    min-height: 3.5rem;
  }

  body[data-page-mode="names"] input[type="text"] {
    min-height: 2.6rem;
    font-size: 0.84rem;
  }

  body[data-page-mode="match"] .screen-head {
    gap: 0.35rem;
    margin-bottom: 0.45rem;
    align-items: center;
    text-align: center;
  }

  body[data-page-mode="match"] .screen-head p {
    display: none;
  }

  body[data-page-mode="match"] .chip-row {
    gap: 0.3rem;
  }

  body[data-page-mode="match"] .chip {
    padding: 0.34rem 0.5rem;
    font-size: 0.6rem;
  }

  body[data-page-mode="match"] .round-grid {
    gap: 0.4rem;
  }

  body[data-page-mode="match"] .card-head {
    padding: 0.6rem 0.7rem;
  }

  body[data-page-mode="match"] .card-body {
    padding: 0.9rem 0.85rem 0.85rem;
  }

  body[data-page-mode="match"] .score-side {
    padding: 0.72rem;
    gap: 0.45rem;
  }

  body[data-page-mode="match"] .score-grid {
    gap: 0.25rem;
  }

  body[data-page-mode="match"] .score-btn {
    min-height: 2.45rem;
    font-size: 0.76rem;
  }

  body[data-page-mode="match"][data-points="21"] .score-btn {
    min-height: 2.2rem;
    font-size: 0.72rem;
  }

  body[data-page-mode="match"][data-points="21"] .score-side {
    flex: 1;
    min-height: 0;
  }

  body[data-page-mode="match"] .score-strip {
    margin-bottom: 0.75rem;
    padding: 0.8rem 0.95rem;
  }

  body[data-page-mode="match"] .score-strip-value {
    font-size: clamp(2.7rem, 10vw, 4rem);
  }

  body[data-page-mode="match"] .score-strip-separator {
    font-size: clamp(2rem, 7vw, 3rem);
  }

  body[data-page-mode="match"][data-points="24"] .score-side {
    padding: 0.78rem;
    gap: 0.5rem;
    min-height: 0;
    flex: 1;
  }

  body[data-page-mode="match"][data-points="24"] .score-grid {
    gap: 0.24rem;
  }

  body[data-page-mode="match"][data-points="24"] .score-btn {
    min-height: 2.25rem;
    font-size: 0.72rem;
    border-radius: 10px;
  }

  body[data-page-mode="match"] .score-center {
    padding: 0.58rem;
    gap: 0.35rem;
  }

  body[data-page-mode="match"] .score-center .score-line {
    font-size: clamp(1.9rem, 7vw, 3rem);
  }

  body[data-page-mode="match"] .scoreboard {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    flex: 1;
  }

  body[data-page-mode="match"] .score-strip {
    margin-bottom: 0.5rem;
    padding: 0.55rem 0.7rem;
  }

  body[data-page-mode="names"] .player-row {
    padding: 0.32rem;
    gap: 0.15rem;
  }

  body[data-page-mode="names"] .player-index {
    font-size: 0.48rem;
  }

  body[data-page-mode="names"] input[type="text"] {
    padding: 0.35rem 0.5rem;
    border-radius: 9px;
    font-size: 0.78rem;
  }

  .player-row {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 0.65rem;
    background: rgba(255,255,255,0.02);
    display: grid;
    gap: 0.35rem;
  }

  .player-index {
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .notice {
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.06);
    color: var(--text);
    padding: 0.75rem 0.85rem;
    border-radius: 16px;
    font-size: 0.84rem;
    line-height: 1.55;
  }

  .notice strong { color: var(--lime); }

  .score-strip {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    margin-bottom: 0.65rem;
    padding: 0.65rem 0.8rem;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: rgba(255,255,255,0.02);
  }

  .score-strip-value {
    font-family: var(--display);
    font-size: clamp(2.1rem, 8vw, 3.5rem);
    line-height: 0.9;
    letter-spacing: 0.06em;
  }

  .score-strip-value.a { color: var(--lime); }
  .score-strip-value.b { color: var(--text); }

  .score-strip-separator {
    font-family: var(--display);
    font-size: clamp(1.8rem, 7vw, 3rem);
    line-height: 0.9;
    color: var(--dim);
  }

  .results-footer {
    margin-top: 0.65rem;
    display: flex;
    justify-content: flex-end;
  }

  .results-footer .btn {
    min-height: 34px;
    padding: 0.52rem 0.8rem;
    font-size: 0.64rem;
  }

  .round-grid {
    display: grid;
    grid-template-rows: 1fr;
    gap: 0.5rem;
    height: 100%;
    min-height: 0;
  }

  .nextup-hero,
  .leaderboard-page {
    display: grid;
    gap: 0.65rem;
    height: 100%;
    min-height: 0;
  }

  .nextup-hero {
    align-content: center;
    justify-items: center;
    text-align: center;
    padding: 0.35rem;
  }

  .nextup-start-wrap {
    width: 100%;
    display: flex;
    justify-content: center;
    margin-top: 0.1rem;
  }

  .nextup-start {
    min-width: min(78vw, 24rem);
    min-height: 3.6rem;
    padding-inline: 1.2rem;
    font-size: 0.9rem;
    letter-spacing: 0.12em;
  }

  .nextup-footer {
    width: 100%;
    display: flex;
    justify-content: flex-start;
    margin-top: auto;
  }

  .nextup-kicker {
    width: 100%;
    font-size: 0.68rem;
    font-weight: 800;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--lime);
    text-align: center;
  }

  .nextup-title {
    width: 100%;
    font-family: var(--display);
    font-size: clamp(4rem, 16vw, 8rem);
    line-height: 0.84;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
    text-shadow: 0 0 30px rgba(217,255,51,0.12);
